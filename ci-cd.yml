name: Full Stack CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build Backend with Maven
      run: |
        cd trade-transaction-reporter
        mvn clean install
    
    - name: Run Backend Tests
      run: |
        cd trade-transaction-reporter
        mvn test

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 10
    
    - name: Install Frontend Dependencies
      run: |
        cd trade-reporter-frontend
        pnpm install
    
    - name: Type Check Frontend
      run: |
        cd trade-reporter-frontend
        pnpm check
    
    - name: Build Frontend
      run: |
        cd trade-reporter-frontend
        pnpm build

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Check Backend Code Quality
      run: |
        cd trade-transaction-reporter
        mvn checkstyle:check || true

  notify:
    needs: [backend-test, frontend-test, code-quality]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check Build Status
      run: |
        if [ "${{ needs.backend-test.result }}" == "failure" ] || [ "${{ needs.frontend-test.result }}" == "failure" ]; then
          echo "Build failed!"
          exit 1
        fi
        echo "All checks passed!"
